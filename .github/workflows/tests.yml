name: Run Tests

on:
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd csvw-safe-library
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          cd csvw-safe-library
          pytest . -vv