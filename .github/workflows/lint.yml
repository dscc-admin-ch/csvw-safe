name: Lint & Format Checks

on:
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: csvw-safe-library

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      # -------------------------
      # Ruff
      # -------------------------
      - name: Run Ruff (lint + import checks)
        run: ruff check src/ tests/

      # -------------------------
      # Type checking
      # -------------------------
      - name: Run mypy
        run: python -m mypy src/

      # -------------------------
      # Tests / docs
      # -------------------------
      - name: Check docstring formatting
        run: python -m pydocstringformatter --check src/ tests/