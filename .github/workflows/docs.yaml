name: Build docs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            mkdocs \
            mkdocs-material \
            mkdocstrings[python] \
            pymdown-extensions

      - name: Install library
        run: pip install -e ./csvw-safe-library

      - name: Build docs
        run: mkdocs build

      - name: Push generated site
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY_DOCS }}
        with:
          source-directory: site/
          destination-github-username: dscc-admin-ch
          destination-repository-name: csvw-safe-docs
          target-branch: main